<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>Tip Calculator</title>
</head>
<body>
    <div class="outer-container">
        
        <form onsubmit="return false;"> 
            <label for="enteredAmount">Enter an amount to continue</label>
            <input type="number" name="amount-entered" id="enteredAmount">
            
            <p id="amount-display-result">Total amount: $0.00</p>
            <p id="amount-display-tip">Tip: $0.00</p>
        </form>

    </div>
    
    <script src="app.js"></script>
</body>
</html>
