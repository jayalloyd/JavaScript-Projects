<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Real-Time Scoreboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f7f9fb; }
        .card { 
            background-color: white; 
            padding: 1.5rem; 
            border-radius: 0.75rem; 
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 4, 0, 0.05); 
        }
        .btn-primary { 
            @apply px-4 py-2 rounded-lg font-semibold transition-all duration-200 shadow-md bg-indigo-600 hover:bg-indigo-700 text-white; 
        }
    </style>
</head>
<body class="p-6 md:p-10">

    <div class="max-w-4xl mx-auto space-y-8">
        <h1 class="text-3xl font-extrabold text-center text-gray-800 mb-6">
            Real-Time Scoreboard (Using Firestore)
        </h1>

        <div class="card">
            <h2 class="text-xl font-bold text-indigo-700 mb-4">Your User Status</h2>
            <div id="user-info" class="text-gray-700 mb-4">Initializing...</div>
            
            <div id="score-controls" class="space-y-4">
                <p class="text-lg font-medium">Add Score:</p>
                <div class="flex space-x-4">
                    <button onclick="addScore(5)" class="btn-primary flex-1">+5 Points</button>
                    <button onclick="addScore(10)" class="btn-primary flex-1">+10 Points</button>
                </div>
                <p class="text-sm text-gray-500">
                    Your current score: <span id="current-score" class="font-bold text-indigo-600">0</span>
                </p>
            </div>
        </div>

        <div class="card">
            <h2 class="text-xl font-bold text-indigo-700 mb-4">Live High Scores</h2>
            <div id="scoreboard-list" class="space-y-2">
                <p class="text-gray-500">Loading scores...</p>
            </div>
        </div>
    </div>

    <!-- Firebase Imports MUST be type="module" -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { 
            getFirestore, 
            doc, 
            setDoc, 
            onSnapshot, 
            collection, 
            query, 
            orderBy,
            limit
        } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { setLogLevel } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Global variables provided by the Canvas environment
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';
        const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : {};
        const initialAuthToken = typeof __initial_auth_token !== 'undefined' ? __initial_auth_token : null;
        
        // --- Core Firebase Initialization ---
        let app;
        let db;
        let auth;
        let userId = 'initializing';
        
        // Expose function globally for button clicks
        window.addScore = addScore; 

        // Set log level for debugging
        setLogLevel('debug');

        async function initFirebase() {
            try {
                // Initialize App and Services
                app = initializeApp(firebaseConfig);
                db = getFirestore(app);
                auth = getAuth(app);

                // Authentication (MANDATORY): Sign in with the provided custom token or anonymously
                if (initialAuthToken) {
                    await signInWithCustomToken(auth, initialAuthToken);
                } else {
                    await signInAnonymously(auth);
                }
                
                // Get the User ID
                userId = auth.currentUser?.uid || crypto.randomUUID();
                document.getElementById('user-info').innerHTML = `
                    **User ID:** <span class="font-mono text-xs bg-gray-200 p-1 rounded">${userId}</span>
                `;

                // Start listeners now that auth is complete
                startScoreListener();
                startCurrentUserScoreListener();

            } catch (error) {
                console.error("Firebase initialization failed:", error);
                document.getElementById('user-info').textContent = "Initialization Failed. Check console for details.";
            }
        }

        /**
         * Real-time listener for the current user's score (Private Data)
         */
        function startCurrentUserScoreListener() {
            // Path: /artifacts/{appId}/users/{userId}/scores/current_score
            const userScoreDocRef = doc(db, 
                `artifacts/${appId}/users/${userId}/scores`, 
                'current_score'
            );

            onSnapshot(userScoreDocRef, (docSnap) => {
                const score = docSnap.exists() ? docSnap.data().score : 0;
                document.getElementById('current-score').textContent = score;
            }, (error) => {
                console.error("Error listening to current user score:", error);
            });
        }

        /**
         * Real-time listener for the public scoreboard (Public Data)
         */
        function startScoreListener() {
            // Path: /artifacts/{appId}/public/data/highscores
            const scoresCollectionRef = collection(db, 
                `artifacts/${appId}/public/data/highscores`
            );
            
            // Query: Get all scores, ordered by score descending, limit to 10
            const q = query(scoresCollectionRef, orderBy('score', 'desc'), limit(10));
            
            // onSnapshot sets up the REAL-TIME listener
            onSnapshot(q, (snapshot) => {
                const scoreboardList = document.getElementById('scoreboard-list');
                scoreboardList.innerHTML = ''; // Clear existing list

                let rank = 1;
                snapshot.forEach((doc) => {
                    const data = doc.data();
                    
                    // Highlight the current user's entry
                    const isCurrentUser = data.userId === userId;
                    const className = isCurrentUser ? 'bg-indigo-100 font-bold' : 'bg-white';

                    const listItem = document.createElement('div');
                    listItem.className = `flex justify-between items-center p-3 rounded-lg border border-gray-200 ${className}`;
                    listItem.innerHTML = `
                        <span class="text-sm font-semibold">${rank}. 
                            ${isCurrentUser ? 'YOU' : data.userId.substring(0, 8) + '...'}
                        </span>
                        <span class="text-lg text-indigo-700">${data.score}</span>
                    `;
                    scoreboardList.appendChild(listItem);
                    rank++;
                });

                if (snapshot.empty) {
                    scoreboardList.innerHTML = '<p class="text-gray-500">No scores posted yet. Be the first!</p>';
                }

            }, (error) => {
                console.error("Error fetching live scoreboard:", error);
            });
        }

        /**
         * Adds a score and updates both the private and public records (Database Write)
         */
        async function addScore(points) {
            const currentScoreEl = document.getElementById('current-score');
            const currentScore = parseInt(currentScoreEl.textContent) || 0;
            const newScore = currentScore + points;

            // --- 1. Update Private User Record (to track total score) ---
            const userScoreDocRef = doc(db, 
                `artifacts/${appId}/users/${userId}/scores`, 
                'current_score'
            );
            await setDoc(userScoreDocRef, { score: newScore, lastUpdated: new Date().toISOString() });


            // --- 2. Update Public Scoreboard Record (to display globally) ---
            // The document ID for the public score is the user's ID
            const publicScoreDocRef = doc(db, 
                `artifacts/${appId}/public/data/highscores`, 
                userId // Use userId as the document ID for easy lookup
            );
            
            // We use setDoc to create or overwrite the existing score for this userId
            await setDoc(publicScoreDocRef, { 
                userId: userId, // Store userId explicitly
                score: newScore, 
                displayName: userId.substring(0, 8), 
                lastUpdated: Date.now() 
            });

            console.log(`Score updated for ${userId}: ${newScore}`);
        }

        // Start the application
        initFirebase();
    </script>
</body>
</html>
<!-- Firestore is a critical component of modern web and mobile application development, especially when you want your apps to be real-time and collaborative.

Here is a simple breakdown of what Firestore is and why we use it for a real-time scoreboard.

What is Firestore?
Firestore (short for Cloud Firestore) is a NoSQL database provided by Google as part of its Firebase platform. It's essentially a place on the internet where your application can store, manage, and retrieve data.

1. Database Type: NoSQL (Documents and Collections)
Instead of using traditional tables, rows, and columns like SQL databases, Firestore uses Collections and Documents.

Document: This is the basic unit of storage, similar to a record or a JSON object. It holds the data in key-value pairs (fields).

Example: A document in our scoreboard app might look like:

JSON

{
  "userId": "XYZ123",
  "score": 45,
  "lastUpdated": 1700000000000
}
Collection: This is simply a container for related documents. Think of it as a folder containing files. Our example uses a collection called highscores to hold all the user score documents.

2. Real-Time Sync is the Superpower
The most important feature of Firestore is its ability to handle real-time synchronization.

When you use a standard method (like fetch or getDoc), you ask the database for information one time.

When you use onSnapshot (as we did in the scoreboard app), you open a continuous connection.

The moment any other user updates data in the database, Firestore automatically pushes that new data out to all connected clients (like your browser windows) instantly, without you having to constantly ask for updates.

This is why the scoreboard updates immediately when you click the button in another browser window!

3. Collaboration and Persistence
Persistence: It saves data permanently. When you close the browser and come back later, your score will still be there.

Multiplayer/Collaboration: Because everyone is reading from and writing to the same central database, it makes it easy to build apps where multiple people interact with the same data simultaneously, like chat apps, collaborative editors, or, in our case, a shared scoreboard. -->
