<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Firestore Core Operations</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f7f9fb; }
        .card { 
            @apply bg-white p-6 rounded-xl shadow-lg border border-gray-100;
        }
        .btn-action { 
            @apply px-4 py-2 rounded-lg font-semibold transition-colors duration-200 shadow-md;
        }
        .btn-indigo { 
            @apply btn-action bg-indigo-600 hover:bg-indigo-700 text-white; 
        }
    </style>
</head>
<body class="p-6 md:p-10">

    <div class="max-w-4xl mx-auto space-y-8">
        <h1 class="text-3xl font-extrabold text-center text-gray-800">
            Firestore Core Operations
        </h1>
        
        <!-- Status Card -->
        <div class="card">
            <h2 class="text-xl font-bold text-gray-700 mb-2">1. Initialization Status</h2>
            <p id="status" class="text-sm text-red-500">Initializing...</p>
            <p id="user-info" class="text-xs mt-2 text-gray-500"></p>
        </div>

        <!-- Write Data Card -->
        <div class="card">
            <h2 class="text-xl font-bold text-indigo-700 mb-4">2. Writing Data (setDoc)</h2>
            <input type="text" id="message-input" placeholder="Enter a message" class="w-full p-2 border border-gray-300 rounded-lg mb-3 focus:outline-none focus:ring-2 focus:ring-indigo-500">
            <button onclick="saveMessage()" class="btn-indigo w-full">Save Message to Firestore</button>
        </div>

        <!-- Read Real-time Card -->
        <div class="card">
            <h2 class="text-xl font-bold text-teal-600 mb-4">3. Reading Data (Real-time: onSnapshot)</h2>
            <p class="text-sm text-gray-600 mb-2">
                This list updates automatically when the database changes.
            </p>
            <div id="realtime-output" class="p-3 bg-gray-50 rounded-lg h-32 overflow-y-auto space-y-2">
                <p class="text-gray-400">Listening for messages...</p>
            </div>
        </div>

        <!-- Read One-time Card -->
        <div class="card">
            <h2 class="text-xl font-bold text-orange-600 mb-4">4. Reading Data (One-time: getDoc)</h2>
            <button onclick="fetchOneTimeMessage()" class="btn-action bg-orange-500 hover:bg-orange-600 text-white">
                Fetch Latest Message Now
            </button>
            <div id="onetime-output" class="mt-4 p-3 bg-yellow-50 rounded-lg text-gray-700">
                <p>Click the button above to fetch data.</p>
            </div>
        </div>
    </div>

    <!-- Firebase Imports and Logic -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { 
            getFirestore, 
            doc, 
            setDoc, 
            onSnapshot, 
            collection, 
            query, 
            orderBy,
            getDoc,
            setLogLevel
        } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Global variables provided by the Canvas environment (MANDATORY USE)
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';
        const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : {};
        const initialAuthToken = typeof __initial_auth_token !== 'undefined' ? __initial_auth_token : null;
        
        let db;
        let auth;
        let userId;

        // Expose functions globally for button clicks
        window.saveMessage = saveMessage;
        window.fetchOneTimeMessage = fetchOneTimeMessage;
        
        // --- 1. Initialization and Authentication ---
        async function initFirebase() {
            setLogLevel('debug'); // Enable detailed console logging

            try {
                const app = initializeApp(firebaseConfig);
                db = getFirestore(app);
                auth = getAuth(app);

                if (initialAuthToken) {
                    await signInWithCustomToken(auth, initialAuthToken);
                } else {
                    await signInAnonymously(auth);
                }
                
                userId = auth.currentUser?.uid || crypto.randomUUID();
                
                document.getElementById('status').textContent = "Initialization Successful!";
                document.getElementById('status').classList.remove('text-red-500');
                document.getElementById('status').classList.add('text-green-600');
                document.getElementById('user-info').innerHTML = `
                    Authenticated as: <span class="font-mono text-xs">${userId.substring(0, 16)}...</span>
                `;

                // Start the real-time listener immediately after setup
                startRealtimeListener();

            } catch (error) {
                console.error("Firebase initialization failed:", error);
                document.getElementById('status').textContent = `Failed: ${error.message}`;
            }
        }
        
        // The collection path will be public, so all users can see messages:
        // /artifacts/{appId}/public/data/messages
        const PUBLIC_COLLECTION_PATH = `artifacts/${appId}/public/data/messages`;

        // --- 2. Writing Data (setDoc) ---
        async function saveMessage() {
            const input = document.getElementById('message-input');
            const messageText = input.value.trim();

            if (!messageText) return;

            try {
                // 1. Get a reference to the specific document.
                // We use Date.now() as a unique ID for each message document.
                const docRef = doc(db, PUBLIC_COLLECTION_PATH, String(Date.now()));
                
                // 2. Use setDoc to write the data (will create the document if it doesn't exist)
                await setDoc(docRef, { 
                    authorId: userId,
                    message: messageText,
                    timestamp: Date.now()
                });

                input.value = ''; // Clear the input field
                console.log("Document successfully written!");

            } catch (e) {
                console.error("Error adding document: ", e);
            }
        }

        // --- 3. Reading Data (Real-time: onSnapshot) ---
        function startRealtimeListener() {
            // 1. Get a reference to the collection
            const messagesRef = collection(db, PUBLIC_COLLECTION_PATH);

            // 2. Create a query: Order by timestamp (newest first)
            const q = query(messagesRef, orderBy('timestamp', 'desc'));
            
            // 3. Set up the REAL-TIME listener with onSnapshot
            onSnapshot(q, (querySnapshot) => {
                const output = document.getElementById('realtime-output');
                output.innerHTML = ''; // Clear the list

                querySnapshot.forEach((doc) => {
                    const data = doc.data();
                    const item = document.createElement('div');
                    item.className = 'p-2 bg-white rounded shadow-sm text-sm';
                    item.innerHTML = `
                        <span class="font-bold text-teal-700">${data.authorId.substring(0, 8)}:</span> 
                        ${data.message}
                    `;
                    output.appendChild(item);
                });
                
                if (querySnapshot.empty) {
                    output.innerHTML = '<p class="text-gray-400">No messages yet. Send one!</p>';
                }

            }, (error) => {
                console.error("Error in real-time listener:", error);
            });
        }

        // --- 4. Reading Data (One-time: getDoc) ---
        async function fetchOneTimeMessage() {
            const output = document.getElementById('onetime-output');
            output.textContent = 'Fetching...';

            try {
                // 1. Get a reference to the collection
                const messagesRef = collection(db, PUBLIC_COLLECTION_PATH);
                
                // 2. Create a query to find the *latest* message
                const q = query(messagesRef, orderBy('timestamp', 'desc'), limit(1));

                // 3. Execute the query to get a snapshot of the results (one-time fetch)
                const querySnapshot = await getDocs(q); 
                
                if (querySnapshot.empty) {
                    output.textContent = "No messages found for one-time fetch.";
                    return;
                }

                // 4. Extract the data from the first document
                const latestDoc = querySnapshot.docs[0];
                const data = latestDoc.data();

                output.innerHTML = `
                    <span class="font-bold text-orange-700">Fetched Message:</span>
                    <span class="text-gray-700">"${data.message}"</span>
                    <span class="block text-xs mt-1">by ${data.authorId.substring(0, 8)}...</span>
                `;

            } catch (e) {
                output.textContent = `Error fetching data: ${e.message}`;
                console.error("Error fetching one-time document: ", e);
            }
        }

        // Start the application
        initFirebase();
    </script>
</body>
</html>
