<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Array Data Aggregator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .font-inter { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-gray-50 flex flex-col items-center justify-center min-h-screen p-4 font-inter">

    <div class="w-full max-w-lg bg-white rounded-2xl shadow-2xl p-8 space-y-6 border border-gray-200">
        
        <h1 class="text-3xl font-extrabold text-gray-800 text-center border-b pb-3">
            Data Aggregator: The Reduce Method
        </h1>
        <p class="text-center text-gray-500">
            Calculates total and summaries from a list of mock transactions.
        </p>

        <!-- Display Area -->
        <div class="space-y-4 pt-4 border-t">
            <div class="flex justify-between items-center p-4 bg-indigo-50 rounded-lg">
                <span class="text-xl font-medium text-indigo-700">Total Expenses:</span>
                <span id="total-output" class="text-3xl font-bold text-indigo-900">$0.00</span>
            </div>
            
            <div class="bg-gray-100 p-4 rounded-lg space-y-2">
                <h2 class="text-lg font-semibold text-gray-700 border-b pb-1">Summary by Category</h2>
                <div id="category-summary" class="text-sm space-y-1">
                    <!-- Summary will be rendered here -->
                </div>
            </div>
        </div>

        <div class="pt-4">
            <h2 class="text-lg font-semibold text-gray-700 mb-2">Transaction List:</h2>
            <ul id="transaction-list" class="space-y-1 text-sm text-gray-600">
                <!-- List items rendered by JS -->
            </ul>
        </div>
    </div>

    <script src="script.js">
       

    </script>
</body>
</html>
