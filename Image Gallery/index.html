<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>Image Gallery</title>
</head>

<h1 style="text-align: center; color: var(--primary-color); padding: var(--space-medium); border-bottom: 2px solid var(--primary-color);">Dynamic Image Gallery</h1>
    
    <div class="row" id="gallery-grid">
      
        <div class="column">
            <img src="./images/img1.jpg" alt="image-one">
        </div>

        <div class="column">
            <img src="./images/img2.avif" alt="image-two">
        </div>

        <div class="column">
            <img src="./images/image3.avif" alt="image-five">
        </div>
        
        <div class="column">
            <img src="./images/image4.avif" alt="image-three">
        </div>
    
        <div class="column">
            <img src="./images/image5.avif" alt="image-four">
        </div>
    </div>
    
   
    <div id="display-container" class="display-container">
     
    </div>




    <script src="script.js"></script>
</body>

</html>
