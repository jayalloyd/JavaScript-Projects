<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML5 Form Validator (No JS)</title>
    <!-- Load Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen p-4 font-inter">

    <body class="bg-gray-100 flex items-center justify-center min-h-screen p-4 font-inter">

    <!-- Message Box for Feedback (Replaces alert()) -->
    <div id="message-box" class="fixed p-4 rounded-lg shadow-xl text-white hidden transition-opacity duration-300">
        <p id="message-content" class="font-medium"></p>
    </div>

    <div class="w-full max-w-md bg-white rounded-2xl shadow-2xl p-8 space-y-6 border border-gray-200">
        
        <h1 class="text-3xl font-extrabold text-gray-900 text-center">
            User Registration (JS Validated)
        </h1>
        <p class="text-center text-gray-500">
            Passwords must match and meet minimum length.
        </p>

        <!-- Added ID for JavaScript targeting -->
        <form id="registration-form" action="#" method="POST" class="space-y-5">
            
            <!-- Email Field -->
            <div>
                <label for="email" class="block text-sm font-medium text-gray-700 mb-1">Email Address</label>
                <input 
                    type="email" 
                    id="email" 
                    name="email" 
                    placeholder="you@example.com"
                    autocomplete="email" 
                    required 
                    class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-indigo-500 focus:border-indigo-500"
                />
            </div>

            <!-- Password Field (Added ID) -->
            <div>
                <label for="password" class="block text-sm font-medium text-gray-700 mb-1">Password</label>
                <input 
                    type="password" 
                    id="password" 
                    name="password" 
                    placeholder="Min. 8 characters"
                    autocomplete="new-password"
                    required 
                    minlength="8"
                    class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-indigo-500 focus:border-indigo-500"
                />
            </div>

            <!-- Confirmation Password Field (Added ID) -->
            <div>
                <label for="confirm-password" class="block text-sm font-medium text-gray-700 mb-1">Confirm Password</label>
                <input 
                    type="password" 
                    id="confirm-password" 
                    name="confirm-password" 
                    placeholder="Repeat password"
                    autocomplete="new-password"
                    required 
                    minlength="8"
                    class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-indigo-500 focus:border-indigo-500"
                />
            </div>
            
            <!-- Terms Checkbox -->
            <div class="flex items-center">
                <input 
                    id="terms" 
                    name="terms" 
                    type="checkbox" 
                    required
                    class="h-4 w-4 text-indigo-600 border-gray-300 rounded focus:ring-indigo-500"
                />
                <label for="terms" class="ml-2 block text-sm text-gray-900">
                    I agree to the <a href="#" class="text-indigo-600 hover:text-indigo-500 font-medium">terms and conditions</a>.
                </label>
            </div>

            <!-- Submit Button -->
            <div>
                <button 
                    type="submit"
                    class="submit-btn w-full flex justify-center py-3 px-4 border border-transparent rounded-lg shadow-sm text-lg font-medium text-white bg-indigo-600 hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500"
                >
                    Register Account
                </button>
            </div>
        </form>
    </div>

            
           
        </form>
    </div>
    <script src="script.js"></script>
</body>
</html>
